services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: salamone
      POSTGRES_PASSWORD: salamone
      POSTGRES_DB: salamone_rails_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: salamone
      MINIO_ROOT_PASSWORD: salamone123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-createbucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 salamone salamone123 &&
      mc mb --ignore-existing local/salamone-development &&
      mc anonymous set download local/salamone-development;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
